name: weather_app
description: Application météo ultra stylée - L3GL ISI 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  dio: ^5.4.0
  
  # State management
  provider: ^6.1.1
  
  # Maps (GRATUIT, sans clé API)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
